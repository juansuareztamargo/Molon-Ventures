<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slingshot Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #87CEEB, #98FB98);
            font-family: Arial, sans-serif;
        }
        
        #game-container {
            position: relative;
        }
        
        canvas {
            border: 2px solid #333;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- Phaser game will be rendered here -->
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
    <script src="src/config/GameConfig.js"></script>
    <script src="src/game/components/SlingshotController.js"></script>
    <script src="src/game/components/Projectile.js"></script>
    <script src="src/game/scenes/SlingshotScene.js"></script>
    <script src="src/main.js"></script>
    <script src="src/validation.js"></script>
</body>
</html>
